name: farmsetu_weather
description: A Flutter weather app using Riverpod, Dio, and Google Maps.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # Core
  riverpod: ^2.5.1
  dio: ^5.4.0
  # Location & Permissions
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.0.1
  # Maps
  google_maps_flutter: ^2.5.0
  # UI / Utils
  intl: ^0.18.1
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  # State persistence (optional)
  shared_preferences: ^2.2.2
  flutter_riverpod: ^2.6.1
  animated_text_kit: ^4.2.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  location: ^8.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/